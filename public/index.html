<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Status</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      user-select: none;
    }
    canvas { display: block; touch-action: none; }
    #score-display {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      font-size: 0.6rem; color: #333; letter-spacing: 0.2em;
      display: none;
    }
  </style>
</head>
<body>
  <div id="score-display">SCORE: <span id="score-val">0</span></div>
  <canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let statusOnline = true;
async function fetchStatus() {
  try {
    const res = await fetch('/status');
    const data = await res.json();
    statusOnline = data.status === 'online';
  } catch(e) {}
}
fetchStatus();
setInterval(fetchStatus, 3000);

let state = 'idle';
let ball, pipes, score, frame, hiScore = 0;
const GRAVITY = 0.45, JUMP = -9, PIPE_W = 44, GAP = 160, PIPE_SPEED = 3, BALL_R = 18;

function initGame() {
  ball = { x: W * 0.25, y: H / 2, vy: 0 };
  pipes = []; score = 0; frame = 0;
}

function jump() {
  if (state === 'idle') {
    state = 'playing';
    document.getElementById('score-display').style.display = 'block';
    initGame(); ball.vy = JUMP;
  } else if (state === 'playing') {
    ball.vy = JUMP;
  } else if (state === 'dead') {
    state = 'idle';
    document.getElementById('score-display').style.display = 'none';
    ball = { x: W * 0.25, y: H / 2, vy: 0 };
    pipes = [];
  }
}

document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); jump(); }});
canvas.addEventListener('pointerdown', e => { e.preventDefault(); jump(); });

function spawnPipe() {
  const minTop = 80, maxTop = H - GAP - 80;
  const top = minTop + Math.random() * (maxTop - minTop);
  pipes.push({ x: W + PIPE_W, top, scored: false });
}

function getDotColor() {
  return statusOnline ? '#00ff88' : '#ff3355';
}

function drawDot(x, y) {
  const color = getDotColor();
  const darkColor = statusOnline ? '#003d22' : '#3d0010';
  const glowColor = statusOnline ? 'rgba(0,255,136,0.4)' : 'rgba(255,51,85,0.4)';

  ctx.save();
  ctx.shadowColor = glowColor; ctx.shadowBlur = 24;
  ctx.beginPath(); ctx.arc(x, y, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
  ctx.restore();

  const grad = ctx.createRadialGradient(x - BALL_R*0.3, y - BALL_R*0.3, BALL_R*0.05, x, y, BALL_R);
  grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.3, color); grad.addColorStop(1, darkColor);
  ctx.beginPath(); ctx.arc(x, y, BALL_R, 0, Math.PI * 2);
  ctx.fillStyle = grad; ctx.fill();

  // Status word above dot
  const label = statusOnline ? 'online' : 'offline';
  ctx.fillStyle = color;
  ctx.font = '700 0.55rem Space Mono, monospace';
  ctx.textAlign = 'center';
  ctx.letterSpacing = '0.2em';
  ctx.fillText(label.toUpperCase(), x, y - BALL_R - 10);

  // "click" below dot (only in idle)
  if (state === 'idle') {
    ctx.fillStyle = '#333';
    ctx.font = '400 0.5rem Space Mono, monospace';
    ctx.fillText('CLICK', x, y + BALL_R + 18);
  }

  // Score below dot when dead
  if (state === 'dead') {
    ctx.fillStyle = '#444';
    ctx.font = '400 0.5rem Space Mono, monospace';
    ctx.fillText('SCORE: ' + score + '  BEST: ' + hiScore, x, y + BALL_R + 18);
  }
}

function drawPipe(p) {
  const color = getDotColor();
  const lineW = 2;

  ctx.strokeStyle = color;
  ctx.lineWidth = lineW;
  ctx.shadowColor = statusOnline ? 'rgba(0,255,136,0.2)' : 'rgba(255,51,85,0.2)';
  ctx.shadowBlur = 8;

  // Top pipe — hollow rectangle (just stroke)
  ctx.strokeRect(p.x, 0, PIPE_W, p.top);

  // Bottom pipe
  const botY = p.top + GAP;
  ctx.strokeRect(p.x, botY, PIPE_W, H - botY);

  ctx.shadowBlur = 0;
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(255,255,255,0.025)'; ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
}

function checkCollision(p) {
  if (ball.x + BALL_R > p.x && ball.x - BALL_R < p.x + PIPE_W) {
    if (ball.y - BALL_R < p.top || ball.y + BALL_R > p.top + GAP) return true;
  }
  return false;
}

function loop() {
  ctx.fillStyle = '#0d0d0d'; ctx.fillRect(0, 0, W, H);
  drawGrid();

  if (state === 'playing') {
    frame++;
    if (frame % 90 === 0) spawnPipe();
    ball.vy += GRAVITY; ball.y += ball.vy;
    for (const p of pipes) {
      p.x -= PIPE_SPEED;
      if (!p.scored && p.x + PIPE_W < ball.x) {
        p.scored = true; score++;
        if (score > hiScore) hiScore = score;
        document.getElementById('score-val').textContent = score;
      }
    }
    pipes = pipes.filter(p => p.x > -PIPE_W - 10);
    if (ball.y + BALL_R > H || ball.y - BALL_R < 0) { state = 'dead'; document.getElementById('score-display').style.display = 'none'; }
    for (const p of pipes) { if (checkCollision(p)) { state = 'dead'; document.getElementById('score-display').style.display = 'none'; break; } }
  }

  for (const p of pipes) drawPipe(p);

  const dotY = state === 'idle' ? H / 2 + Math.sin(Date.now() / 600) * 8 : ball.y;
  drawDot(ball ? ball.x : W * 0.25, dotY);

  requestAnimationFrame(loop);
}

ball = { x: W * 0.25, y: H / 2, vy: 0 };
pipes = [];
loop();
</script>
</body>
</html>
